# fly.toml app configuration file generated for codence-bridge on 2026-06-14T14:32:01+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'codence-bridge'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  BRIDGE_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
